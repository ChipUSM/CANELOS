<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <h2 class="footer-heading">{{ site.title | escape }}</h2>
        <ul class="contact-list">
                    <li class="p-name" style="display: flex; align-items: center; gap: 8px;">
            {%- if site.author -%}
              {{ site.author | escape }}
            {%- endif -%}
            
            <a href="https://www.instagram.com/chip_usm/" target="_blank" rel="noopener noreferrer" style="display: flex; align-items: center;">
              <img src="{{ site.baseurl }}/assets/img/tu_logo_instagram.png" alt="Instagram ChipUSM" style="width: 20px; height: auto;">
            </a>
          </li>

          {%- if site.email -%}
          <li><a class="u-email" href="mailto:{{ site.email }}">{{ site.email }}</a></li>
          {%- endif -%}
        </ul>
      </div>
    
      <div class="footer-col footer-col-2">
              </div>

      <div class="footer-col footer-col-3">
        <p>{{- site.description | newline_to_br -}}</p>
      </div>
    </div>
    
    <h1 class="home-title" style="text-align: center; font-weight: 800; font-size: 32px; color: #222222; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 50px; margin-bottom: 30px;"> Organizadores: </h1>
    
    <div class="footer-col-wrapper">
        <div class="logos-col logos-col-1">
            <a href="https://chipusm.github.io/ChipUSM/">
                <img src="{{ site.baseurl}}/assets/img/logo_chipusm.png" alt="Logo ChipUSM" width="300"/>
            </a>
        </div>
        <div class="logos-col logos-col-1">
            <a href="https://ieee-cas.org/">
                <img src="{{ site.baseurl}}/assets/img/logo_cass.png" alt="Logo CAS" width="350"/>
            </a>
        </div>
    </div>
    
    <hr style="border: 0; height: 1px; background-image: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0)); margin: 50px auto; width: 75%;">

    <h1 class="home-title" style="text-align: center; font-weight: 800; font-size: 32px; color: #222222; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 20px; margin-bottom: 30px;"> Patrocinadores: </h1>
    
    <div class="footer-col-wrapper">
        <div class="logos-col logos-col-2">
            <a href="https://ac3e.usm.cl/">
                <img src="{{ site.baseurl}}/assets/img/logo_ac3e_2.png" alt="Logo AC3E" width="200"/>
            </a>
        </div>
        <div class="logos-col logos-col-2">
            <img src="{{ site.baseurl}}/assets/img/synopsys.png" alt="Logo CAS" width="250"/>
        </div>
    </div>
    <div class="footer-col-wrapper" align="right">
        <div class="logos-col logos-col-2">
            <a href="https://electronica.usm.cl/">
                <img src="{{ site.baseurl}}/assets/img/logo_departamento.png" alt="Logo Departamento de Electrónica" width="250"/>
            </a>
        </div>
        <div class="logos-col logos-col-2">
            <img src="{{ site.baseurl}}/assets/img/logo_ieee.png" alt="Logo IEEE" width="250"/>
        </div>
        <div class="logos-col logos-col-2">
            <a href="https://www.ieee.org/">
                <img src="{{ site.baseurl}}/assets/img/SSCS.png" alt="Logo SSCS" width="200"/>
            </a>
        </div>
    </div>
    <div class="footer-col-wrapper" align="right">
        <div class="logos-col logos-col-4">
        </div>
        <div class="logos-col logos-col-2">
            <a href="https://eds.ieee.org/">
                <img src="{{ site.baseurl}}/assets/img/logo_eds.png" alt="Logo EDS" width="180"/>
            </a>
        </div>
        <div class="logos-col logos-col-4">
        </div>
    </div>
    
      </div>

</footer>
